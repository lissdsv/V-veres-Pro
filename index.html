    <style>
        :root {
            --primary: #6366f1; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --dark: #0f172a; --bg: #f1f5f9; --card-bg: #ffffff;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;

        /* HEADER PREMIUM */
        .header-premium {
            background: linear-gradient(145deg, #4f46e5 0%, #7c3aed 100%);
            color: white; padding: 25px 20px 40px 20px; border-radius: 0 0 40px 40px;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.2);
            position: sticky; top: -10px; z-index: 100;
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .brand-name { font-size: 1.6rem; font-weight: 900; letter-spacing: -1px; }
        
        .pills-row { display: flex; gap: 8px; }
        .tasa-pill { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); padding: 8px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(255, 255, 255, 0.3); cursor: pointer; }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .glass-box { background: rgba(255, 255, 255, 0.12); padding: 14px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); }
        .glass-box small { display: block; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; opacity: 0.9; }
        .stat-main { font-size: 0.95rem; font-weight: 900; display: block; }
        .stat-sub { font-size: 0.75rem; font-weight: 600; opacity: 0.8; display: block; }

        .container { max-width: 500px; margin: auto; padding: 20px 15px 180px 15px; }

        /* CALENDARIO MODERNO */
        .calendar-section {
            background: white; padding: 20px; border-radius: 25px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex; flex-direction: column; gap: 10px;
        }
        .calendar-label { font-size: 0.7rem; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .modern-datepicker {
            border: 2px solid #f1f5f9; background: #f8fafc; padding: 12px; border-radius: 15px;
            font-family: inherit; font-size: 1rem; font-weight: 700; color: var(--dark);
            outline: none; cursor: pointer; transition: 0.3s;
        }
        .modern-datepicker:focus { border-color: var(--primary); background: white; }

        /* PRODUCT CARDS */
        .product-card {
            background: var(--card-bg); border-radius: 28px; padding: 22px; margin-bottom: 16px;
            display: flex; flex-direction: column; gap: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.03); border: 1px solid #ffffff;
        }
        .product-name-hero { font-size: 1.25rem; font-weight: 800; color: var(--dark); text-transform: uppercase; letter-spacing: -0.2px; line-height: 1.2; }
        .stock-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-top: -2px; }
        .price-row-subtle { display: flex; align-items: center; gap: 12px; margin-top: 2px; }
        .price-bs-subtle { font-size: 1rem; font-weight: 700; color: var(--text-muted); }
        .price-usd-subtle { font-size: 0.85rem; font-weight: 600; color: var(--success); opacity: 0.8; }
        .stock-bar-bg { width: 100%; height: 5px; background: #f1f5f9; border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .stock-bar-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; }

        .btn-row { display: flex; gap: 10px; margin-top: 12px; }
        .btn-add { flex: 3; background: var(--dark); color: white; border: none; padding: 14px; border-radius: 18px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem; }
        .btn-edit { flex: 1; background: #f1f5f9; color: var(--dark); border: none; padding: 14px; border-radius: 18px; font-weight: 800; cursor: pointer; }

        /* MODALES */
        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; position: relative; }
        input.modern { width: 100%; padding: 16px; margin: 8px 0 15px 0; border-radius: 20px; border: 2px solid #f1f5f9; background: #f8fafc; box-sizing: border-box; font-size: 1rem; outline: none; font-weight: 600; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 20px; font-weight: 700; width: 100%; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn-ghost { background: none; color: #64748b; border: none; padding: 12px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 5px; }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); display: flex; justify-content: space-around; padding: 15px 0 35px 0; border-top: 1px solid #f1f5f9; z-index: 1000; backdrop-filter: blur(15px); }
        .nav-item { text-align: center; color: #94a3b8; font-size: 0.75rem; font-weight: 700; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); transform: translateY(-3px); transition: 0.3s; }

        /* HISTORIAL */
        .receipt-card { background: white; border-radius: 22px; padding: 18px; margin-bottom: 12px; border: 1px solid #edf2f7; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .receipt-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .receipt-details { font-size: 0.8rem; color: #64748b; border-top: 1px dashed #e2e8f0; padding-top: 10px; margin-top: 10px; }

        #cart-bar { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); width: 85%; background: var(--dark); color: white; padding: 20px; border-radius: 25px; display: none; justify-content: space-between; align-items: center; z-index: 1500; }
        #toast { position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 12px 25px; border-radius: 50px; z-index: 6000; display: none; font-weight: 700; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        #ticket-capture { background: white; padding: 25px; color: black; font-family: 'Courier New', monospace; border: 1px solid #eee; width: 280px; margin: 0 auto 15px auto; box-sizing: border-box; }
        .vuelto-box { padding: 15px; border-radius: 20px; text-align: center; font-weight: bold; margin-bottom: 15px; }

        .pay-methods-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .method-btn { padding: 15px; border-radius: 20px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 800; font-size: 0.8rem; cursor: pointer; text-align: center; }
        .method-btn.active { border-color: var(--primary); background: #e0e7ff; color: var(--primary); }
        
                .method-btn.active { border-color: var(--primary); background: #e0e7ff; color: var(--primary); }

        /* --- NUEVO: BLOQUEO POR LICENCIA --- */
        #license-lock {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: #0f172a; /* Color oscuro para que no vean la app de fondo */
            z-index: 9999; 
            display: none; /* Se activa por JavaScript si no hay licencia */
            align-items: center; 
            justify-content: center; 
            color: white; 
            text-align: center;
            backdrop-filter: blur(10px);
        }

        #license-lock .modern {
            width: 80%;
            max-width: 300px;
            text-align: center;
            margin: 20px 0;
            border: 2px solid #4f46e5;
        }
        
    </style>
</head>
<body>

<div id="license-lock">
    <div style="padding: 20px;">
        <h2>🔐 Licencia Requerida</h2>
        <p>Introduce tu clave para activar Víveres Pro</p>
        <input type="text" id="license-input" class="modern" placeholder="XXXX-XXXX-XXXX">
        <button class="btn-main" onclick="validateLicense()">ACTIVAR APP</button>
        <p id="license-status" style="margin-top:15px; font-size:0.8rem; color:var(--danger)"></p>
    </div>
</div>


<div id="toast"></div>

<div id="dynamic-modal" class="modal">
    <div class="modal-content" id="modal-body"></div>
</div>

<div class="header-premium">
    <div class="header-top">
        <div class="brand-name">Víveres Pro</div>
        <div class="pills-row">
            <div class="tasa-pill" onclick="showConfigModal()">% <span id="margin-txt">20</span></div>
            <div class="tasa-pill" onclick="showConfigModal()">Bs <span id="tasa-txt">0.00</span></div>
        </div>
    </div>
    <div class="stats-container">
        <div class="glass-box">
            <small>Venta Total Hoy</small>
            <span class="stat-main" id="stat-ventas-bs">0.00 Bs</span>
            <span class="stat-sub" id="stat-ventas-usd">$ 0.00</span>
        </div>
        <div class="glass-box">
            <small>Ganancia Neta</small>
            <span class="stat-main" id="stat-ganancia-bs" style="color: #4ade80;">0.00 Bs</span>
            <span class="stat-sub" id="stat-ganancia-usd" style="color: #4ade80;">$ 0.00</span>
        </div>
    </div>
</div>

<div class="container">
    <div id="page-inv" class="page">
        <input type="text" id="search" placeholder="🔍 Buscar producto..." onkeyup="render()" class="modern">
        <div id="inventory-list"></div>
    </div>

    <div id="page-add" class="page" style="display:none">
        <div style="background:white; padding:30px; border-radius:35px;">
            <h3>📦 Registrar Producto</h3>
            <label>Nombre del Producto</label><input type="text" id="n-name" class="modern">
            <label>Costo Base ($)</label><input type="number" id="n-cost" class="modern" step="0.01">
            <label>Stock Inicial</label><input type="number" id="n-stock" class="modern">
            <button class="btn-main" onclick="addProduct()">AÑADIR A LISTA</button>
        </div>
    </div>

    <div id="page-hist" class="page" style="display:none">
        <div class="calendar-section">
            <span class="calendar-label">Filtrar por Fecha</span>
            <input type="date" id="history-date" class="modern-datepicker" onchange="renderHistory()">
        </div>

        <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center">
            <h3>Caja del día</h3>
            <button onclick="confirmClearHistory()" style="background:#fee2e2; border:none; color:var(--danger); padding:10px 15px; border-radius:15px; font-weight:bold">VACIAR</button>
        </div>
        <div id="history-list"></div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="switchTab('inv', this)">🛒<br>Ventas</div>
    <div class="nav-item" onclick="switchTab('add', this)">📦<br>Inventario</div>
    <div class="nav-item" onclick="switchTab('hist', this)">📊<br>Caja</div>
</nav>

<div id="cart-bar" onclick="openCart()">
    <span id="cart-qty" style="font-weight:900">0 ITEMS</span>
    <b id="cart-total" style="font-size:1.1rem">0.00 Bs</b>
</div>

<script>
  
  async function loadData() {
    const licenseKey = localStorage.getItem('v20_license');
    if (!licenseKey) return;

    try {
        const doc = await db.collection("licencias").doc(licenseKey).get();
        if (doc.exists) {
            const data = doc.data();
            // Si el documento tiene datos, reemplazamos lo local con lo de la nube
            if (data.inventory) products = data.inventory;
            if (data.history) history = data.history;
            if (data.config) {
                tasa = data.config.tasa || tasa;
                margin = data.config.margin || margin;
            }
            render(); // Dibujamos la app con los datos nuevos
        }
    } catch (error) {
        console.error("Error cargando datos de Firebase:", error);
    }
}

  
    let tasa = parseFloat(localStorage.getItem('v20_tasa') || 36.5);
    let margin = parseFloat(localStorage.getItem('v20_margin') || 20);
    let products = JSON.parse(localStorage.getItem('v20_inv') || "[]");
    let history = JSON.parse(localStorage.getItem('v20_hist') || "[]");
    let cart = [];
    let selectedMethod = 'Efectivo';

    // Inicializar fecha de hoy en el calendario
 window.onload = async () => {
    const savedKey = localStorage.getItem('v20_license');
    
    if (!savedKey) {
        document.getElementById('license-lock').style.display = 'flex';
    } else {
        const isValid = await checkLicenseInFirebase(savedKey);
        if (!isValid) {
            document.getElementById('license-lock').style.display = 'flex';
        } else {
            // SI LA LICENCIA ES VÁLIDA, CARGAMOS LOS DATOS
            await loadData(); 
        }
    }

    // Configuración inicial de fecha (tu código original)
    const today = new Date().toISOString().split('T')[0];
    const historyDateInput = document.getElementById('history-date');
    if (historyDateInput) historyDateInput.value = today;
    
    render();
};


async function validateLicense() {
    const key = document.getElementById('license-input').value.trim();
    const statusMsg = document.getElementById('license-status');
    
    statusMsg.innerText = "Verificando...";
    
    const isValid = await checkLicenseInFirebase(key);
    
    if (isValid) {
        localStorage.setItem('v20_license', key);
        document.getElementById('license-lock').style.display = 'none';
        toast("✅ Licencia Activada");
    } else {
        statusMsg.innerText = "❌ Clave inválida o expirada";
    }
}

async function checkLicenseInFirebase(key) {
    try {
        const doc = await db.collection("licencias").doc(key).get();
        if (doc.exists) {
            const data = doc.data();
            // Verificar si está activa y si no ha expirado
            if (data.status === "active") {
                return true;
            }
        }
        return false;
    } catch (e) {
        console.error("Error validando licencia:", e);
        return false;
    }
}


    function render() {
        document.getElementById('tasa-txt').innerText = tasa.toFixed(2);
        document.getElementById('margin-txt').innerText = margin;
        const list = document.getElementById('inventory-list');
        const q = document.getElementById('search').value.toLowerCase();
        list.innerHTML = '';
        
        products.filter(p => p.n.toLowerCase().includes(q)).forEach(p => {
            const pUsd = p.c * (1 + (margin / 100));
            const stockPct = Math.min((p.s / 50) * 100, 100);
            let stockColor = p.s > 10 ? 'var(--success)' : (p.s > 0 ? 'var(--warning)' : 'var(--danger)');
            let stockText = p.s > 0 ? `${p.s} disponibles` : "Sin existencias";

            list.innerHTML += `
                <div class="product-card">
                    <div class="product-name-hero">${p.n}</div>
                    <div class="stock-label" style="color: ${stockColor}">${stockText}</div>
                    <div class="price-row-subtle">
                        <span class="price-bs-subtle">${(pUsd*tasa).toFixed(2)} Bs</span>
                        <span class="price-usd-subtle">$ ${pUsd.toFixed(2)}</span>
                    </div>
                    <div class="stock-bar-bg"><div class="stock-bar-fill" style="width:${stockPct}%; background:${stockColor}"></div></div>
                    <div class="btn-row">
                        <button class="btn-add" onclick="addToCart(${p.id})">AÑADIR 🛒</button>
                        <button class="btn-edit" onclick="editProductModal(${p.id})">⚙️</button>
                    </div>
                </div>`;
        });
        updateStats();
    }

    function addToCart(id) {
        const p = products.find(x => x.id === id);
        if(p.s <= 0) return toast("¡Producto agotado!");
        const item = cart.find(x => x.id === id);
        if(item) { if(item.qty < p.s) item.qty++; else return toast("Stock insuficiente"); }
        else { cart.push({ ...p, qty: 1, pUsd: p.c * (1 + (margin / 100)) }); }
        updateCartUI();
        toast("Añadido");
    }

    function updateCartUI() {
        const bar = document.getElementById('cart-bar');
        if(cart.length > 0) {
            bar.style.display = 'flex';
            let tBs = cart.reduce((acc, i) => acc + (i.pUsd * i.qty * tasa), 0);
            document.getElementById('cart-qty').innerText = cart.reduce((a,b)=>a+b.qty,0) + " ITEMS";
            document.getElementById('cart-total').innerText = tBs.toFixed(2) + " Bs";
        } else bar.style.display = 'none';
    }

    function finishSale() {
        const now = new Date();
        const saleRecord = {
            id: Date.now(),
            time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            date: now.toISOString().split('T')[0], // Guardamos YYYY-MM-DD para el filtro
            displayDate: now.toLocaleDateString(),
            totalBs: 0,
            totalGan: 0,
            currentTasa: tasa,
            method: selectedMethod,
            items: []
        };

        cart.forEach(i => {
            const p = products.find(x => x.id === i.id);
            if(p) p.s -= i.qty;
            const subtotalBs = i.pUsd * i.qty * tasa;
            const subtotalGan = (i.pUsd - i.c) * i.qty * tasa;
            saleRecord.totalBs += subtotalBs;
            saleRecord.totalGan += subtotalGan;
            saleRecord.items.push({ n: i.n, qty: i.qty, bs: subtotalBs });
        });

        history.unshift(saleRecord);
        cart = []; updateCartUI(); save(); closeModal(); toast("✅ Venta Guardada");
        updateStats();
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        const selectedDate = document.getElementById('history-date').value;
        const filteredSales = history.filter(h => h.date === selectedDate);
        
        list.innerHTML = filteredSales.map(h => `
            <div class="receipt-card">
                <div class="receipt-header" onclick="toggleReceipt(${h.id})">
                    <span><b>Recibo #${h.id.toString().slice(-4)}</b><br><small>${h.time} • ${h.method}</small></span>
                    <div style="text-align:right">
                        <b style="color:var(--primary)">${h.totalBs.toFixed(2)} Bs</b><br>
                        <small style="color:var(--success); font-weight:bold">$ ${(h.totalBs/h.currentTasa).toFixed(2)}</small>
                    </div>
                </div>
                <div id="details-${h.id}" class="receipt-details" style="display:none">
                    ${h.items.map(i => `<div style="display:flex; justify-content:space-between"><span>${i.qty}x ${i.n}</span><span>${i.bs.toFixed(2)} Bs</span></div>`).join('')}
                    <div style="margin-top:5px; font-size:0.65rem; color:#94a3b8">Tasa: ${h.currentTasa} | Ganancia: ${h.totalGan.toFixed(2)} Bs</div>
                </div>
            </div>`).join('') || `<center style="padding:20px; color:#94a3b8">No hay ventas el día ${selectedDate}</center>`;
        
        updateStats(); // Actualizamos los stats al cambiar de fecha también
    }

    function updateStats() {
        const selectedDate = document.getElementById('history-date')?.value || new Date().toISOString().split('T')[0];
        let totalBs = 0, totalGan = 0;
        history.filter(h => h.date === selectedDate).forEach(h => { 
            totalBs += h.totalBs; totalGan += h.totalGan; 
        });
        document.getElementById('stat-ventas-bs').innerText = totalBs.toFixed(2) + " Bs";
        document.getElementById('stat-ventas-usd').innerText = "$ " + (totalBs / tasa).toFixed(2);
        document.getElementById('stat-ganancia-bs').innerText = totalGan.toFixed(2) + " Bs";
        document.getElementById('stat-ganancia-usd').innerText = "$ " + (totalGan / tasa).toFixed(2);
    }

    function toggleReceipt(id) {
        const el = document.getElementById(`details-${id}`);
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    /* --- ALERTAS MODERNAS --- */
    function confirmClearHistory() {
        const body = document.getElementById('modal-body');
        body.innerHTML = `
            <div style="text-align:center; padding:10px">
                <div style="font-size:3rem; margin-bottom:15px">⚠️</div>
                <h3 style="margin-bottom:10px">¿Vaciar Historial?</h3>
                <p style="color:var(--text-muted); font-weight:600; font-size:0.9rem">Esta acción eliminará TODO el historial guardado permanentemente.</p>
                <button class="btn-main" style="background:var(--danger); margin-top:20px" onclick="clearHistoryAction()">SÍ, VACIAR TODO</button>
                <button class="btn-ghost" onclick="closeModal()">CANCELAR</button>
            </div>`;
        document.getElementById('dynamic-modal').style.display = 'flex';
    }
    function clearHistoryAction() { history = []; save(); renderHistory(); closeModal(); toast("Historial vaciado"); }

    /* --- GESTIÓN DE CARRITO Y COBRO --- */
    function openCart() {
        const body = document.getElementById('modal-body');
        const tBs = cart.reduce((acc, i) => acc + (i.pUsd * i.qty * tasa), 0);
        body.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px"><h3>Carrito</h3><button onclick="closeModal()" style="background:none; border:none; font-size:1.5rem">✕</button></div>
            <div style="max-height:200px; overflow-y:auto; background:#f8fafc; padding:15px; border-radius:20px; margin-bottom:15px">
                ${cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:8px"><span>${i.qty}x ${i.n}</span><b>${(i.pUsd*i.qty*tasa).toFixed(2)} Bs</b></div>`).join('')}
            </div>
            <button class="btn-main" style="background:#4f46e5" onclick="showTicketPreview()">🧾 VER COTIZACIÓN</button>
            <button class="btn-main" style="background:var(--success)" onclick="showPaymentModal(${tBs})">💵 COBRAR</button>
            <button class="btn-ghost" style="color:var(--danger)" onclick="cart=[]; updateCartUI(); closeModal();">VACIAR CARRITO</button>`;
        document.getElementById('dynamic-modal').style.display = 'flex';
    }

    function showPaymentModal(total) {
        const body = document.getElementById('modal-body');
        selectedMethod = 'Efectivo';
        body.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px"><h3>Cobro</h3><button onclick="openCart()" style="background:none; border:none; font-size:0.8rem; font-weight:bold; color:var(--primary)">← VOLVER</button></div>
            <center><div style="font-size:2.2rem; font-weight:900">${total.toFixed(2)} Bs</div><div style="font-size:1.2rem; font-weight:700; color:var(--success)">$ ${(total/tasa).toFixed(2)}</div></center>
            <div class="pay-methods-grid">
                <div class="method-btn active" onclick="setMethod('Efectivo', this)">💵 Efectivo</div>
                <div class="method-btn" onclick="setMethod('Pago Móvil', this)">📲 P. Móvil</div>
                <div class="method-btn" onclick="setMethod('Punto', this)">💳 Punto</div>
                <div class="method-btn" onclick="setMethod('Divisas', this)">🇺🇸 Divisas</div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label style="font-size:0.65rem; font-weight:900">PAGÓ BS</label><input type="number" id="p-bs" class="modern" oninput="calcVuelto(${total})"></div>
                <div><label style="font-size:0.65rem; font-weight:900">PAGÓ $</label><input type="number" id="p-usd" class="modern" oninput="calcVuelto(${total})"></div>
            </div>
            <div id="vuelto-box" class="vuelto-box" style="display:none"></div>
            <button class="btn-main" style="background:var(--success)" onclick="finishSale()">FINALIZAR VENTA ✅</button>`;
    }

    function calcVuelto(total) {
        const pBs = parseFloat(document.getElementById('p-bs').value) || 0;
        const pUsd = parseFloat(document.getElementById('p-usd').value) || 0;
        const recibido = pBs + (pUsd * tasa);
        const box = document.getElementById('vuelto-box');
        if(recibido > 0) {
            box.style.display = 'block';
            let diff = recibido - total;
            const esVuelto = diff >= 0;
            box.style.background = esVuelto ? "#dcfce7" : "#fee2e2";
            box.innerHTML = `<small style="font-weight:900">${esVuelto ? 'VUELTO' : 'FALTANTE'}</small><div style="font-size:1.6rem">${Math.abs(diff).toFixed(2)} Bs</div><div style="font-size:0.9rem">$ ${(Math.abs(diff)/tasa).toFixed(2)}</div>`;
        } else box.style.display = 'none';
    }

    /* --- VISTA DE COTIZACIÓN --- */
    function showTicketPreview() {
        const body = document.getElementById('modal-body');
        const now = new Date();
        const fStr = now.toLocaleDateString() + " " + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        const tBs = cart.reduce((acc, i) => acc + (i.pUsd*i.qty*tasa), 0);
        
        body.innerHTML = `
            <h3>Vista de Cotización</h3>
            <div id="ticket-capture">
                <center><b>*** COTIZACIÓN ***</b><br><b>VÍVERES PRO</b><br><small>${fStr}</small></center>
                <hr style="border:0; border-top:1px dashed #000; margin:10px 0">
                ${cart.map(i => `<div style="display:flex; justify-content:space-between; font-size:0.75rem"><span>${i.qty}x ${i.n}</span><span>${(i.pUsd*i.qty*tasa).toFixed(2)}</span></div>`).join('')}
                <hr style="border:0; border-top:1px dashed #000; margin:10px 0">
                <div style="display:flex; justify-content:space-between; font-weight:bold"><span>TOTAL BS</span><span>${tBs.toFixed(2)}</span></div>
                <div style="display:flex; justify-content:space-between; font-weight:bold; color:var(--success)"><span>TOTAL USD</span><span>$ ${(tBs/tasa).toFixed(2)}</span></div>
                <center style="margin-top:10px; font-size:0.6rem">Tasa: ${tasa} Bs</center>
            </div>
            <button class="btn-main" onclick="downloadTicket()">🖼️ GUARDAR IMAGEN</button>
            <button class="btn-main" style="background:#25d366" onclick="copyTicketText('${fStr}', ${tBs})">📄 COPIAR TEXTO</button>
            <button class="btn-ghost" onclick="openCart()">← VOLVER</button>
        `;
    }

    function copyTicketText(fecha, total) {
        let txt = `📄 *COTIZACIÓN: VÍVERES PRO*\n📅 ${fecha}\n----------------------------\n`;
        cart.forEach(i => txt += `• ${i.qty}x ${i.n} - ${(i.pUsd*i.qty*tasa).toFixed(2)} Bs\n`);
        txt += `----------------------------\n💰 *TOTAL: ${total.toFixed(2)} Bs*\n💵 *TOTAL USD: $ ${(total/tasa).toFixed(2)}*\n(Tasa: ${tasa})`;
        navigator.clipboard.writeText(txt).then(() => toast("✅ Texto copiado"));
    }

    function downloadTicket() {
        html2canvas(document.getElementById('ticket-capture')).then(canvas => {
            const link = document.createElement('a'); link.download = 'cotizacion.png'; link.href = canvas.toDataURL(); link.click();
        });
    }

    // --- CONFIG Y GESTIÓN PRODUCTOS ---
    function showConfigModal() {
        const body = document.getElementById('modal-body');
        body.innerHTML = `<h3>Configuración</h3><label>Tasa Bs</label><input type="number" id="nt" class="modern" value="${tasa}"><label>Margen %</label><input type="number" id="nm" class="modern" value="${margin}"><button class="btn-main" onclick="updateConfig()">GUARDAR</button><button class="btn-ghost" onclick="closeModal()">CERRAR</button>`;
        document.getElementById('dynamic-modal').style.display = 'flex';
    }
    function updateConfig() { tasa = parseFloat(document.getElementById('nt').value) || tasa; margin = parseFloat(document.getElementById('nm').value) || margin; save(); closeModal(); }

    function editProductModal(id) {
        const p = products.find(x => x.id === id);
        const body = document.getElementById('modal-body');
        body.innerHTML = `<h3>Editar Producto</h3><label>Nombre</label><input type="text" id="e-n" class="modern" value="${p.n}"><label>Costo $</label><input type="number" id="e-c" class="modern" value="${p.c}"><label>Stock</label><input type="number" id="e-s" class="modern" value="${p.s}"><button class="btn-main" onclick="updateProduct(${p.id})">ACTUALIZAR</button><button class="btn-main" style="background:var(--danger)" onclick="confirmDeleteProduct(${p.id})">ELIMINAR</button><button class="btn-ghost" onclick="closeModal()">CERRAR</button>`;
        document.getElementById('dynamic-modal').style.display = 'flex';
    }
    function updateProduct(id) {
        const p = products.find(x => x.id === id);
        p.n = document.getElementById('e-n').value; p.c = parseFloat(document.getElementById('e-c').value); p.s = parseInt(document.getElementById('e-s').value);
        save(); closeModal();
    }
    function confirmDeleteProduct(id) {
        const body = document.getElementById('modal-body');
        body.innerHTML = `
            <div style="text-align:center; padding:10px">
                <div style="font-size:3rem; margin-bottom:15px">🗑️</div>
                <h3>¿Eliminar Producto?</h3>
                <button class="btn-main" style="background:var(--danger); margin-top:20px" onclick="deleteProductAction(${id})">ELIMINAR AHORA</button>
                <button class="btn-ghost" onclick="closeModal()">CANCELAR</button>
            </div>`;
        document.getElementById('dynamic-modal').style.display = 'flex';
    }
    function deleteProductAction(id) { products = products.filter(x => x.id !== id); save(); closeModal(); toast("Eliminado"); }

    function addProduct() {
        const n = document.getElementById('n-name').value;
        const c = parseFloat(document.getElementById('n-cost').value);
        const s = parseInt(document.getElementById('n-stock').value) || 0;
        if(n && c) {
            products.push({ id: Date.now(), n, c, s });
            save(); toast("Producto añadido");
            document.getElementById('n-name').value = ''; document.getElementById('n-cost').value = '';
            switchTab('inv', document.querySelectorAll('.nav-item')[0]);
        }
    }

    // --- UI HELPERS ---
    function setMethod(method, el) {
        selectedMethod = method;
        document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function switchTab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-'+id).style.display = 'block';
        el.classList.add('active');
        if(id === 'hist') renderHistory();
    }

    function toast(m) { const t = document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }
    function closeModal() { document.getElementById('dynamic-modal').style.display = 'none'; }
// Sincroniza los datos con Firebase
async function save() {
    const licenseKey = localStorage.getItem('v20_license');
    if (!licenseKey) return;

    // Guardamos en la colección de esa licencia específica
    await db.collection("licencias").doc(licenseKey).update({
        inventory: products,
        history: history,
        config: { tasa, margin }
    });
    
    render();
}

    
    if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker registrado', reg))
            .catch(err => console.log('Error al registrar Service Worker', err));
    });
}

    
</script>
</body>
</html>
